server:
  replicas: 1

  dataStorage:
    enabled: true
    size: 1Gi

  standalone:
    enabled: true

  config: |
    ui = true

    listener "tcp" {
      address = "[::]:8200"
      cluster_address = "[::]:8201"
      tls_disable = 1
    }

    storage "raft" {
      path = "/openbao/data"
    }